name: Build Preview APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: EAS Preview Build (APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        run: npm install -g eas-cli

      - name: Build APK via EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive

      - name: Get build artifact URL
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Build complete. Download the APK from https://expo.dev/accounts/eeis/projects/eeis-prayer-times/builds"
