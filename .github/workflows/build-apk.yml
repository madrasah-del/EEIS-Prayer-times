name: Build Release APK

# Triggers: every push to main, or manually from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: expo prebuild → Gradle release APK
    runs-on: ubuntu-latest   # GitHub-hosted runner — free for public repos,
                              # counts against 2 000 free minutes/month for private

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # ── 3. JDK (Gradle needs JDK 17) ────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ──────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Patch app.json — disable expo-updates for sideload builds ────────
      #    expo-updates tries to contact Expo's OTA CDN on startup. In a
      #    sideloaded APK (no EAS channel configured) it hangs before JS loads,
      #    keeping the splash screen visible forever.
      - name: Disable expo-updates in app.json
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.plugins = (cfg.expo.plugins || []).filter(p => p !== 'expo-updates');
            cfg.expo.updates = { enabled: false };
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
            console.log('expo-updates disabled');
          "

      # ── 6. Generate native Android project ──────────────────────────────────
      - name: expo prebuild (generate android/ project)
        run: npx expo prebuild --platform android --clean --no-install

      # ── 7. Increase Gradle JVM memory + disable release lint checks ──────────
      #    Default Metaspace (512 MB) causes OutOfMemoryError when lintVital
      #    runs across all modules. We bump heap to 4 GB + Metaspace to 2 GB,
      #    and disable checkReleaseBuilds (lint vital) since this is a dev build.
      - name: Configure Gradle for CI
        run: |
          # Increase JVM Metaspace — prevents OOM during lintVitalAnalyze tasks
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties

          # Disable lint in release builds — not needed for dev sideload APKs
          # Inserts 'lint { checkReleaseBuilds = false }' right after 'android {'
          sed -i '/^android {/a\    lint { checkReleaseBuilds = false }' android/app/build.gradle

          echo "Gradle config patched"

      # ── 8. Write dev signing keystore ───────────────────────────────────────
      #    PKCS12 keystore generated once with OpenSSL (dev/test key only).
      #    Consistent across all CI builds so updates install over previous
      #    sideloads without uninstalling. NOT used for Play Store (EAS manages that).
      - name: Write signing keystore
        run: |
          echo "" | base64 -d > android/app/eeis-dev.keystore

      # ── 9. Build release APK via Gradle ─────────────────────────────────────
      #    assembleRelease produces __DEV__=false — identical to EAS preview APK.
      #    No Metro connections, standard asset bundling, deterministic splash.
      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=eeis-dev.keystore \
            -Pandroid.injected.signing.store.password=eeis_dev_2026 \
            -Pandroid.injected.signing.key.alias=eeis \
            -Pandroid.injected.signing.key.password=eeis_dev_2026 \
            --no-daemon

      # ── 10. Upload APK as downloadable artifact ──────────────────────────────
      #    Go to: Actions → this run → scroll to Artifacts → download "release-apk"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
