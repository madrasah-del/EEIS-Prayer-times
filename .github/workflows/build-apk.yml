name: Build Debug APK

# Triggers: every push to main, or manually from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: expo prebuild → Gradle debug APK
    runs-on: ubuntu-latest   # GitHub-hosted runner — free for public repos,
                              # counts against 2 000 free minutes/month for private

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # ── 3. JDK (Gradle needs JDK 17) ────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ──────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Patch app.json — disable expo-updates for sideload builds ────────
      #    expo-updates tries to contact Expo's OTA CDN on startup. In a
      #    sideloaded debug APK (no EAS channel configured) it hangs before
      #    JS loads, keeping the splash screen visible forever.
      #    We strip the plugin and mark updates as disabled so the app boots
      #    straight from the bundled JS with no network check.
      - name: Disable expo-updates in app.json
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            // Remove expo-updates plugin
            cfg.expo.plugins = (cfg.expo.plugins || []).filter(p => p !== 'expo-updates');
            // Mark updates as disabled so the native module skips the check
            cfg.expo.updates = { enabled: false };
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
            console.log('expo-updates disabled');
          "

      # ── 6. Generate native Android project ──────────────────────────────────
      #    --clean removes any stale android/ directory first
      #    This runs all Expo config plugins (including withPrayerAlarmService)
      - name: expo prebuild (generate android/ project)
        run: npx expo prebuild --platform android --clean --no-install

      # ── 6. Build debug APK via Gradle ───────────────────────────────────────
      #    -PbundleInDebug=true packs the JS bundle INTO the APK so it works
      #    without a Metro dev server running — fully self-contained sideload.
      - name: Build debug APK (self-contained, no dev server needed)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -PbundleInDebug=true --no-daemon

      # ── 7. Upload APK as downloadable artifact ───────────────────────────────
      #    Go to: Actions → this run → scroll to Artifacts → download "debug-apk"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # artifact kept for 30 days
